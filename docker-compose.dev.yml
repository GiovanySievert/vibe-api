services:
  postgres:
    image: postgres:17
    container_name: vibe-api-postgres-dev
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
    ports:
      - '5423:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - vibe-network-dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docker -d auth']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vibe-api-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - vibe-network-dev
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vibe-api-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data_dev:/data
    networks:
      - vibe-network-dev
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: vibe-api-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/vibes &&
        mc anonymous set download local/vibes
      "
    networks:
      - vibe-network-dev
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: vibe-api-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
    networks:
      - vibe-network-dev
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: oven/bun:1.2.21-alpine
    container_name: vibe-api-app-dev
    working_dir: /app
    command: bun run --watch src/index.ts
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vibe-network-dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
  rabbitmq_data_dev:
  minio_data_dev:
  redis_data_dev:

networks:
  vibe-network-dev:
    driver: bridge
