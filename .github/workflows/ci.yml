name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: vibe-api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Validate Docker build
        run: docker build -t vibe-api:ci .
